<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="{{ '/' | relative_url }}" class="site-title">jaehoon's blog</a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}">Blog</a>
        <a href="{{ '/about' | relative_url }}">About</a>
        <a href="{{ '/contact' | relative_url }}">Contact</a>
      </nav>
    </div>
  </header>

  <main class="content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p>&copy; {{ 'now' | date: "%Y" }} jaehoon's blog. Powered by <a href="https://pages.github.com/">GitHub Pages</a>.</p>
    </div>
  </footer>
</body>
</html>
